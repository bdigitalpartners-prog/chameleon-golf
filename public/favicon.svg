<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A0F0D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1512"/>
      <stop offset="100%" stop-color="#0A0F0D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- "g" italic -->
  <text x="128" y="340" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="260" font-weight="400" fill="#FFFFFF" letter-spacing="-8">g</text>
  <!-- "EQ" bold -->
  <text x="268" y="340" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="220" fill="#FFFFFF" letter-spacing="-4">E</text>
  <!-- Emerald accent bar -->
  <rect x="128" y="360" width="256" height="6" rx="3" fill="#10B981"/>
</svg>
