<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;display=swap');</style>
    <clipPath id="clip"><rect width="512" height="512" rx="96"/></clipPath>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <!-- Contour hint lines -->
  <g clip-path="url(#clip)" opacity="0.15" stroke="#4ADE80" stroke-width="2" fill="none">
    <ellipse cx="100" cy="120" rx="180" ry="140"/>
    <ellipse cx="100" cy="120" rx="240" ry="190"/>
    <ellipse cx="100" cy="120" rx="300" ry="240"/>
    <ellipse cx="420" cy="400" rx="160" ry="130"/>
    <ellipse cx="420" cy="400" rx="220" ry="180"/>
    <ellipse cx="420" cy="400" rx="280" ry="230"/>
    <ellipse cx="256" cy="256" rx="300" ry="250"/>
    <ellipse cx="256" cy="256" rx="360" ry="300"/>
  </g>
  <!-- Golf ball -->
  <circle cx="256" cy="251" r="155" fill="white"/>
  <!-- EQ text -->
  <text x="256" y="265" text-anchor="middle" dominant-baseline="central"
    font-family="Inter, system-ui, sans-serif" font-weight="800"
    font-size="140" fill="#0a5c2a" letter-spacing="-4">EQ</text>
</svg>