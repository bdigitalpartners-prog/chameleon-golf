kind = "web"
previewPath = "/"
title = "Chameleon Golf"
version = "1.0.0"
id = "artifacts/chameleon-golf"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25395
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/chameleon-golf run dev"

[services.env]
PORT = "25395"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chameleon-golf", "run", "build"]
publicDir = "artifacts/chameleon-golf/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
